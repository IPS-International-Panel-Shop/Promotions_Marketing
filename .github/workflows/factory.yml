name: Suburb Factory
on: 
  workflow_dispatch: # This creates the manual "Play" button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run Factory Script
        run: python factory.py

      - name: Commit and Push Pages
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # Move files from dist folder to the root so they are live
          cp -r dist/* . 
          git add .
          git commit -m "Industrial Output: Suburb pages generated" || exit 0
          git push
